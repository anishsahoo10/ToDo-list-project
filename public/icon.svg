<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#grad)"/>
  
  <!-- Checkmark icon -->
  <g transform="translate(100, 120)">
    <!-- Checkbox outline -->
    <rect x="0" y="40" width="312" height="312" rx="40" fill="none" stroke="white" stroke-width="24"/>
    
    <!-- Checkmark -->
    <path d="M 80 200 L 140 260 L 240 140" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
